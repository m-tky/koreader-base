name: Fork divergence stats

# Reports per-file line-count divergence vs upstream/master.  Output lands
# in the run summary; this is informational, the job never fails.
# Vendored deps under spec/rocks/ dominate the raw stats and are excluded.

on:
  schedule:
    - cron: '15 0 * * *'  # Nightly, after sync-upstream
  workflow_dispatch:
  pull_request:
    paths:
      - 'cre.cpp'
      - 'thirdparty/**'
      - 'ffi/**'

jobs:
  divergence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/koreader/koreader-base.git || true
          git fetch upstream master

      - name: Report divergence
        run: |
          {
            echo "## Fork divergence vs upstream/master"
            echo
            echo "Top 20 files by added+removed lines (vendored deps under spec/rocks/ excluded)."
            echo
            echo '```'
            git diff --numstat upstream/master HEAD \
              | grep -v '^[0-9-]*[[:space:]][0-9-]*[[:space:]]spec/rocks/' \
              | awk '{ print $1 + $2, $1, $2, $3 }' \
              | sort -nr \
              | head -20 \
              | awk 'BEGIN { printf "%-8s %-8s %-8s  %s\n", "TOTAL", "ADDED", "REMOVED", "FILE" }
                     { printf "%-8s %-8s %-8s  %s\n", $1, $2, $3, $4 }'
            echo '```'
            echo
            echo "Total: $(git diff --shortstat upstream/master HEAD)"
          } >> "$GITHUB_STEP_SUMMARY"
