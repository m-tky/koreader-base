name: Sync from upstream koreader-base

on:
  schedule:
    - cron: '0 8 * * 5'  # Friday at 08:00 UTC (17:00 JST)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Merge from upstream koreader-base
        run: |
          git remote add upstream https://github.com/koreader/koreader-base.git
          git fetch upstream master

          # Merge upstream; abort and open issue on conflict
          if ! git merge upstream/master --no-edit; then
            git merge --abort
            echo "MERGE_FAILED=true" >> $GITHUB_ENV
          fi

      - name: Restore our .gitmodules (pin crengine to m-tky fork)
        if: env.MERGE_FAILED != 'true'
        run: |
          if ! git rev-parse --verify ORIG_HEAD > /dev/null 2>&1; then
            echo "Already up to date — nothing to restore."
            exit 0
          fi
          git checkout ORIG_HEAD -- .gitmodules
          if ! git diff --cached --quiet; then
            git commit --amend --no-edit
          fi

      - name: Push
        if: env.MERGE_FAILED != 'true'
        run: git push origin master

      - name: Create issue on merge conflict
        if: env.MERGE_FAILED == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Upstream sync failed: merge conflict',
              body: 'Automatic sync from koreader/koreader-base failed due to a merge conflict. Manual resolution required.\n\nWorkflow run: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              labels: ['upstream-sync'],
            });
